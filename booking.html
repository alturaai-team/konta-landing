<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dogovorite se za klic — Konta</title>
<meta name="description" content="Rezervirajte termin za predstavitev paketa Firma.">
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>body{font-family:'Inter',sans-serif}</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">

  <!-- Nav -->
  <nav class="bg-white border-b border-gray-100 px-6 py-4">
    <a href="konta-landing.html" class="text-xl font-extrabold text-gray-900 tracking-tight">Konta.</a>
  </nav>

  <!-- Main -->
  <main class="flex-1 flex items-center justify-center px-4 py-16">
    <div class="w-full max-w-lg">

      <h1 class="text-3xl font-extrabold text-gray-900 text-center mb-2">Dogovorite se za klic</h1>
      <p class="text-gray-500 text-center mb-10">Izpolnite obrazec in izberite termin. Poklicali vas bomo ob izbranem času.</p>

      <!-- Form -->
      <form id="booking-form" class="bg-white rounded-2xl border border-gray-200 p-8 space-y-5">

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1.5">Ime in priimek *</label>
          <input type="text" id="f-name" required class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition" placeholder="Janez Novak">
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1.5">Ime podjetja / pisarne *</label>
          <input type="text" id="f-firm" required class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition" placeholder="Računovodstvo Novak d.o.o.">
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1.5">E-pošta *</label>
            <input type="email" id="f-email" required class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition" placeholder="janez@podjetje.si">
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1.5">Telefon</label>
            <input type="tel" id="f-phone" class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition" placeholder="+386 ...">
          </div>
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1.5">Število strank</label>
          <select id="f-clients" class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition text-gray-700">
            <option value="">Izberite...</option>
            <option value="50-100">50 – 100</option>
            <option value="100-200">100 – 200</option>
            <option value="200-500">200 – 500</option>
            <option value="500+">500+</option>
          </select>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1.5">Želeni datum *</label>
            <input type="date" id="f-date" required class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition">
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1.5">Želena ura *</label>
            <select id="f-time" required class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition text-gray-700">
              <option value="">Izberite...</option>
              <option value="08:00">08:00</option>
              <option value="08:30">08:30</option>
              <option value="09:00">09:00</option>
              <option value="09:30">09:30</option>
              <option value="10:00">10:00</option>
              <option value="10:30">10:30</option>
              <option value="11:00">11:00</option>
              <option value="11:30">11:30</option>
              <option value="12:00">12:00</option>
              <option value="13:00">13:00</option>
              <option value="13:30">13:30</option>
              <option value="14:00">14:00</option>
              <option value="14:30">14:30</option>
              <option value="15:00">15:00</option>
              <option value="15:30">15:30</option>
              <option value="16:00">16:00</option>
            </select>
          </div>
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1.5">Sporočilo (neobvezno)</label>
          <textarea id="f-message" rows="3" class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition resize-none" placeholder="Povejte nam o vaših potrebah..."></textarea>
        </div>

        <button type="submit" id="btn-submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-xl font-semibold text-sm transition-colors">
          Rezerviraj termin
        </button>

        <div id="form-error" class="hidden text-red-600 text-sm text-center font-medium"></div>
      </form>

      <!-- Success state -->
      <div id="success-msg" class="hidden bg-white rounded-2xl border border-gray-200 p-10 text-center">
        <div class="w-16 h-16 bg-green-50 rounded-full flex items-center justify-center mx-auto mb-5">
          <svg class="w-8 h-8 text-green-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
        </div>
        <h2 class="text-2xl font-bold text-gray-900 mb-2">Termin rezerviran!</h2>
        <p class="text-gray-500 mb-1">Hvala za vaše zanimanje. Poklicali vas bomo ob izbranem času.</p>
        <p class="text-gray-400 text-sm">Potrditev smo poslali na vaš e-poštni naslov.</p>
        <a href="konta-landing.html" class="inline-block mt-6 text-blue-600 hover:underline text-sm font-semibold">Nazaj na domačo stran</a>
      </div>

    </div>
  </main>

  <!-- Footer -->
  <footer class="border-t border-gray-100 py-6 text-center text-sm text-gray-400">
    &copy; 2026 Konta. Vse pravice pridržane.
  </footer>

<script>
  const SB_URL = 'https://qtqvooozbidwvvqjxjkg.supabase.co';
  const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF0cXZvb296Ymlkd3Z2cWp4amtnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3MjkxOTUsImV4cCI6MjA4OTMwNTE5NX0.OUf9-DlArTtCt0wh6oNHnvWougUJCwsEzewEp5m4DgU';
  const sb = supabase.createClient(SB_URL, SB_KEY);

  // Set min date to tomorrow
  const dateInput = document.getElementById('f-date');
  const tomorrow = new Date();
  tomorrow.setDate(tomorrow.getDate() + 1);
  // Skip weekends
  while (tomorrow.getDay() === 0 || tomorrow.getDay() === 6) tomorrow.setDate(tomorrow.getDate() + 1);
  dateInput.min = tomorrow.toISOString().split('T')[0];

  document.getElementById('booking-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn = document.getElementById('btn-submit');
    const errEl = document.getElementById('form-error');
    errEl.classList.add('hidden');
    btn.disabled = true;
    btn.textContent = 'Pošiljam...';

    const data = {
      contact_name: document.getElementById('f-name').value.trim(),
      firm_name: document.getElementById('f-firm').value.trim(),
      email: document.getElementById('f-email').value.trim(),
      phone: document.getElementById('f-phone').value.trim() || null,
      num_clients: document.getElementById('f-clients').value || null,
      preferred_date: document.getElementById('f-date').value,
      preferred_time: document.getElementById('f-time').value,
      message: document.getElementById('f-message').value.trim() || null,
    };

    const { error } = await sb.from('booking_requests').insert(data);

    if (error) {
      errEl.textContent = 'Napaka pri pošiljanju. Poskusite znova.';
      errEl.classList.remove('hidden');
      btn.disabled = false;
      btn.textContent = 'Rezerviraj termin';
      return;
    }

    document.getElementById('booking-form').classList.add('hidden');
    document.getElementById('success-msg').classList.remove('hidden');
  });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="google-site-verification" content="lLWf45ck_OXnEVrnybrz58WbZJl4iHt9EesvxvAYXlo">
<title>Kontakt — Konta</title>
<meta name="description" content="Kontaktirajte ekipo Konta — odgovorimo v enem delovnem dnevu. Pišite nam po e-pošti ali izpolnite obrazec za hitro pomoč.">
<link rel="canonical" href="https://konta.si/contact.html">
<link rel="icon" href="/favicon.ico" type="image/x-icon">
<meta property="og:title" content="Kontakt — Konta">
<meta property="og:description" content="Kontaktirajte ekipo Konta — odgovorimo v enem delovnem dnevu.">
<meta property="og:url" content="https://konta.si/contact.html">
<meta property="og:type" content="website">
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">

  <!-- Nav -->
  <nav class="bg-white border-b border-gray-100 px-6 py-4">
    <a href="konta-landing.html" class="flex items-center"><img src="konta-logo-t2.webp" alt="konta." style="height:28px;"></a>
  </nav>

  <!-- Main -->
  <main class="flex-1 flex items-center justify-center px-4 py-16">
    <div class="w-full max-w-lg">

      <h1 class="text-3xl font-extrabold text-gray-900 text-center mb-2">Pišite nam</h1>
      <p class="text-gray-500 text-center mb-10">Odgovorimo v enem delovnem dnevu.</p>

      <div class="grid md:grid-cols-3 gap-4 mb-10">
        <div class="bg-white rounded-xl border border-gray-200 p-5 text-center">
          <div class="w-10 h-10 bg-blue-50 rounded-xl flex items-center justify-center mx-auto mb-3">
            <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
          </div>
          <p class="text-xs font-semibold text-gray-700">E-pošta</p>
          <p class="text-xs text-gray-400 mt-1">support@konta.si</p>
        </div>
        <div class="bg-white rounded-xl border border-gray-200 p-5 text-center">
          <div class="w-10 h-10 bg-blue-50 rounded-xl flex items-center justify-center mx-auto mb-3">
            <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg>
          </div>
          <p class="text-xs font-semibold text-gray-700">Telefon</p>
          <p class="text-xs text-gray-400 mt-1">+386 40 188 999</p>
        </div>
        <div class="bg-white rounded-xl border border-gray-200 p-5 text-center">
          <div class="w-10 h-10 bg-blue-50 rounded-xl flex items-center justify-center mx-auto mb-3">
            <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          </div>
          <p class="text-xs font-semibold text-gray-700">Povprečen čas odgovora</p>
          <p class="text-xs text-gray-400 mt-1">&lt; 1 uro</p>
        </div>
      </div>

      <div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-8">
        <form onsubmit="handleContact(event)" class="space-y-5">
          <div class="grid sm:grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-semibold text-gray-700 mb-1.5">Ime in priimek</label>
              <input type="text" placeholder="Ana Novak" required
                class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
            </div>
            <div>
              <label class="block text-sm font-semibold text-gray-700 mb-1.5">E-pošta</label>
              <input type="email" placeholder="ana@pisarna.si" required
                class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
            </div>
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1.5">Zadeva</label>
            <select required class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition text-gray-600">
              <option value="" disabled selected>Izberite temo…</option>
              <option>Splošno vprašanje</option>
              <option>Tehnična podpora</option>
              <option>Cene in naročnine</option>
              <option>Partnerstvo</option>
              <option>Drugo</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1.5">Sporočilo</label>
            <textarea rows="4" placeholder="Opišite, kako vam lahko pomagamo…" required
              class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition resize-none"></textarea>
          </div>
          <button type="submit"
            class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 rounded-xl transition-colors text-sm shadow-sm">
            Pošljite sporočilo
          </button>
        </form>
      </div>

    </div>
  </main>

  <footer class="text-center py-6 text-xs text-gray-400">
    © 2025 Konta. Narejen v Sloveniji 🇸🇮
  </footer>

  <script>
    function handleContact(e) {
      e.preventDefault();
      const btn = e.target.querySelector('button[type=submit]');
      btn.textContent = 'Pošiljam…';
      btn.disabled = true;
      setTimeout(() => {
        btn.textContent = '✓ Sporočilo poslano!';
        btn.classList.replace('bg-blue-600', 'bg-green-600');
        btn.classList.replace('hover:bg-blue-700', 'hover:bg-green-700');
      }, 1200);
    }
  </script>
</body>
</html>
